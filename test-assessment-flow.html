<!DOCTYPE html>
<html>
<head>
    <title>Test Assessment Flow</title>
</head>
<body>
    <h2>Test Assessment API Flow</h2>
    
    <div>
        <h3>1. Test Login & Get Token</h3>
        <button onclick="testLogin()">Login Test User</button>
        <div id="loginResult"></div>
    </div>
    
    <div>
        <h3>2. Test Assessment Questions</h3>
        <button onclick="testAssessmentQuestions()">Get Assessment Questions</button>
        <div id="questionsResult"></div>
    </div>
    
    <div>
        <h3>3. Token Status</h3>
        <button onclick="checkToken()">Check Current Token</button>
        <div id="tokenResult"></div>
    </div>

    <script>
        async function testLogin() {
            const result = document.getElementById('loginResult');
            result.innerHTML = 'Testing login...';
            
            try {
                // First register a test user
                const registerResponse = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: 'Test User',
                        email: 'test@assessment.com',
                        password: 'password123',
                        age: 25,
                        currentRole: 'Developer'
                    })
                });
                
                if (registerResponse.ok) {
                    result.innerHTML = 'User registered. Check console for OTP, then login manually.';
                } else {
                    // Try login directly
                    const loginResponse = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            email: 'test@assessment.com',
                            password: 'password123'
                        })
                    });
                    
                    const loginData = await loginResponse.json();
                    result.innerHTML = `Login response: ${JSON.stringify(loginData)}`;
                }
            } catch (error) {
                result.innerHTML = `Error: ${error.message}`;
            }
        }
        
        async function testAssessmentQuestions() {
            const result = document.getElementById('questionsResult');
            result.innerHTML = 'Testing assessment questions...';
            
            const token = localStorage.getItem('token');
            if (!token) {
                result.innerHTML = 'No token found. Please login first.';
                return;
            }
            
            try {
                const response = await fetch('/api/assessment/questions', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                const data = await response.json();
                result.innerHTML = `
                    <p>Status: ${response.status}</p>
                    <p>Questions: ${JSON.stringify(data, null, 2)}</p>
                `;
            } catch (error) {
                result.innerHTML = `Error: ${error.message}`;
            }
        }
        
        function checkToken() {
            const result = document.getElementById('tokenResult');
            const token = localStorage.getItem('token');
            result.innerHTML = token ? 
                `Token present: ${token.substring(0, 50)}...` : 
                'No token found in localStorage';
        }
    </script>
</body>
</html>
