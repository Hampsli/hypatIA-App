<!DOCTYPE html>
<html>
<head>
    <title>Direct Assessment Test</title>
</head>
<body>
    <h2>Direct Assessment Test</h2>
    
    <div>
        <h3>Step 1: Create Test Login</h3>
        <button onclick="createDirectLogin()">Create Direct Login Token</button>
        <div id="loginResult"></div>
    </div>
    
    <div>
        <h3>Step 2: Test Assessment Questions</h3>
        <button onclick="testQuestions()">Get Questions</button>
        <div id="questionsResult"></div>
    </div>
    
    <div>
        <h3>Step 3: Navigate to Assessment</h3>
        <button onclick="goToAssessment()">Go to Assessment Page</button>
    </div>

    <script>
        async function createDirectLogin() {
            const result = document.getElementById('loginResult');
            result.innerHTML = 'Creating direct login...';
            
            // For testing, we'll manually create a JWT token
            // In a real app, this would come from proper authentication
            const testToken = 'test-token-' + Date.now();
            const testUser = {
                id: 1,
                name: 'Test User',
                email: 'test@example.com',
                isFirstLogin: false
            };
            
            localStorage.setItem('token', testToken);
            localStorage.setItem('user', JSON.stringify(testUser));
            
            result.innerHTML = `
                <p style="color: green;">✅ Test login created</p>
                <p>Token: ${testToken}</p>
                <p>User: ${JSON.stringify(testUser)}</p>
            `;
        }
        
        async function testQuestions() {
            const result = document.getElementById('questionsResult');
            result.innerHTML = 'Testing questions...';
            
            const token = localStorage.getItem('token');
            if (!token) {
                result.innerHTML = '<p style="color: red;">No token found. Create login first.</p>';
                return;
            }
            
            try {
                const response = await fetch('/api/assessment/questions', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                const data = await response.json();
                result.innerHTML = `
                    <p>Status: ${response.status}</p>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                result.innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
            }
        }
        
        function goToAssessment() {
            window.location.href = '/assessment';
        }
    </script>
</body>
</html>
